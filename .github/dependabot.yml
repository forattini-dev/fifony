version: 2
updates:
  # pnpm ecosystem — Dependabot cannot update transitive deps for pnpm
  # (see: https://github.com/dependabot/dependabot-core/issues/8603).
  # Restrict to direct deps to avoid `tool_feature_not_supported` failures.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "direct"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
