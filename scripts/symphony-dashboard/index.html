<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Symphony Local Dashboard</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Symphony</p>
          <h1>Symphony Local Runtime</h1>
          <p id="subtitle" class="muted">Runtime TypeScript · Modo local memory</p>
        </div>
        <div class="badges">
          <span id="health" class="badge">status: connecting</span>
          <span id="lastRefresh" class="badge">refresh: -</span>
        </div>
      </header>

      <main class="layout">
        <section class="card">
          <h2>Visão geral</h2>
          <div id="overview" class="grid"></div>
        </section>

        <section class="card">
          <div class="toolbar">
            <h2>Issues locais</h2>
            <div class="toolbar-right">
              <label for="state-filter">Filtrar:</label>
              <select id="state-filter">
                <option value="all">Todas</option>
                <option value="Todo">Todo</option>
                <option value="In Progress">In Progress</option>
                <option value="In Review">In Review</option>
                <option value="Blocked">Blocked</option>
                <option value="Done">Done</option>
                <option value="Cancelled">Cancelled</option>
              </select>

              <label for="query">Busca:</label>
              <input id="query" placeholder="ex: LOCAL-1, titulo" />
            </div>
          </div>
          <div id="issue-list" class="issue-list"></div>
        </section>

        <section class="card">
          <h2>Runtime</h2>
          <div id="runtime-meta"></div>
        </section>
      </main>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
